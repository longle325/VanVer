server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # --- Compression (text assets only; webp/audio/woff2 are already compressed) ---
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        text/javascript
        application/json
        image/svg+xml;

    # Security headers. NOTE: a `location` that sets its own add_header drops these
    # inherited ones, so they are repeated inside each location below.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # --- Content-hashed build assets: filename changes on every deploy, cache forever ---
    location ~* \.(js|css)$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        # No `always`: don't attach long cache headers to 4xx/5xx (e.g. cached 404s).
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Fonts: stable filenames but effectively never change; cache a year (not immutable) ---
    location ~* \.woff2$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        # No `always`: don't attach long cache headers to 4xx/5xx (e.g. cached 404s).
        add_header Cache-Control "public, max-age=31536000";
    }

    # --- Media (NOT content-hashed): images & audio live at stable paths, so avoid
    #     `immutable` — a replaced asset must be able to propagate. Cache 30 days. ---
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|mp3|wav)$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        # No `always`: don't attach long cache headers to 4xx/5xx (e.g. cached 404s).
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA: all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
