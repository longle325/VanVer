name: Deploy to Cloud Run

on:
  push:
    branches:
      - deploy
      - feat/rank

env:
  PROJECT_ID: cs317-mlops
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  ARTIFACT_REPOSITORY: vanver
  BACKEND_SERVICE: vanver-backend
  FRONTEND_SERVICE: vanver-frontend
  PUBLIC_BACKEND_URL: https://api.vanver.app
  PUBLIC_FRONTEND_URL: https://vanver.app
  PUBLIC_FRONTEND_WWW_URL: https://www.vanver.app
  WORKLOAD_IDENTITY_PROVIDER: projects/724238746267/locations/global/workloadIdentityPools/github-actions/providers/vanver
  SERVICE_ACCOUNT: github-actions-deployer@cs317-mlops.iam.gserviceaccount.com

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build backend image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.BACKEND_SERVICE }}:latest \
            .

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.BACKEND_SERVICE }}:latest

      - name: Deploy backend to Cloud Run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SESSION_SECRET_KEY: ${{ secrets.SESSION_SECRET_KEY }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          SESSION_COOKIE_SECURE: ${{ secrets.SESSION_COOKIE_SECURE }}
          SESSION_COOKIE_SAMESITE: ${{ secrets.SESSION_COOKIE_SAMESITE }}
          SESSION_MAX_AGE_SECONDS: ${{ secrets.SESSION_MAX_AGE_SECONDS }}
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_GOOGLE_SERVER_METADATA_URL: ${{ secrets.OAUTH_GOOGLE_SERVER_METADATA_URL }}
          OAUTH_GOOGLE_SCOPE: ${{ secrets.OAUTH_GOOGLE_SCOPE }}
        run: |
          : "${DATABASE_URL:?DATABASE_URL secret is required}"
          : "${OPENAI_API_KEY:?OPENAI_API_KEY secret is required}"

          ALLOWED_REDIRECTS='["'"${PUBLIC_FRONTEND_URL}"'","'"${PUBLIC_FRONTEND_WWW_URL}"'","http://localhost:5173","http://127.0.0.1:5173","capacitor://localhost","https://localhost"]'
          ENV_VARS="DATABASE_URL=${DATABASE_URL}||OPENAI_API_KEY=${OPENAI_API_KEY}||CHAT_MODEL=gpt-5-mini||EMBEDDING_MODEL=text-embedding-3-large||EMBEDDING_DIMENSIONS=3072||SESSION_COOKIE_SECURE=true||CORS_ORIGINS=[\"*\"]||OAUTH_CALLBACK_BASE_URL=${PUBLIC_BACKEND_URL}||OAUTH_POST_LOGIN_REDIRECT=${PUBLIC_FRONTEND_URL}||OAUTH_ALLOWED_REDIRECT_ORIGINS=${ALLOWED_REDIRECTS}"

          append_env() {
            local name="$1"
            local value="${!name:-}"
            if [ -n "$value" ]; then
              ENV_VARS="${ENV_VARS}||${name}=${value}"
            fi
          }

          append_env SESSION_SECRET_KEY
          append_env SESSION_COOKIE_NAME
          append_env SESSION_COOKIE_SAMESITE
          append_env SESSION_MAX_AGE_SECONDS
          append_env OAUTH_GOOGLE_CLIENT_ID
          append_env OAUTH_GOOGLE_CLIENT_SECRET
          append_env OAUTH_GOOGLE_SERVER_METADATA_URL
          append_env OAUTH_GOOGLE_SCOPE

          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8081 \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "^||^${ENV_VARS}" \
            --quiet

      - name: Get backend URL
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

  # ── Frontend ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build frontend image
        working-directory: frontend
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ env.PUBLIC_BACKEND_URL }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.FRONTEND_SERVICE }}:latest \
            .

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.FRONTEND_SERVICE }}:latest

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --quiet

      - name: Update backend public origins
        run: |
          BACKEND=${{ env.PUBLIC_BACKEND_URL }}
          FRONTEND=${{ env.PUBLIC_FRONTEND_URL }}
          WWW_FRONTEND=${{ env.PUBLIC_FRONTEND_WWW_URL }}
          ALLOWED_REDIRECTS='["'"${FRONTEND}"'","'"${WWW_FRONTEND}"'","http://localhost:5173","http://127.0.0.1:5173","capacitor://localhost","https://localhost"]'

          gcloud run services update ${{ env.BACKEND_SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --update-env-vars "^||^CORS_ORIGINS=[\"*\"]||OAUTH_CALLBACK_BASE_URL=${BACKEND}||OAUTH_POST_LOGIN_REDIRECT=${FRONTEND}||OAUTH_ALLOWED_REDIRECT_ORIGINS=${ALLOWED_REDIRECTS}" \
            --quiet

      - name: Show deployed URLs
        run: |
          echo "## Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** ${{ env.PUBLIC_FRONTEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend www:** ${{ env.PUBLIC_FRONTEND_WWW_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** ${{ env.PUBLIC_BACKEND_URL }}" >> $GITHUB_STEP_SUMMARY
