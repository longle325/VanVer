services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: vanver-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vanver
    ports:
      - "5432:5432"
    volumes:
      - vanver-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vanver"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vanver-postgres-data:
